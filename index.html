<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Todo List</title>
    </head>
    <body>
        <h1 id="title">Todo Tracker</h1>
        <main id="content">
            <form action="" id="task-form">
                <section id="taskSection">
                    <input
                        type="text"
                        id="inputTask"
                        placeholder="Start writing and press enter to add a task"
                    />
                </section>
            </form>
            <ul id="task-list">
                <li>
                    <button
                        type="button"
                        class="toggle-btn"
                        aria-label="Mark as completed"
                    >
                        <img src="images/checkbox.svg" alt="" />
                    </button>
                    <span class="task-text">
                        left click to mark as completed
                    </span>
                    <button
                        type="button"
                        class="delete-btn"
                        aria-label="Delete task"
                    >
                        <img src="images/trash.svg" alt="" />
                    </button>
                </li>
                <li>
                    <button
                        type="button"
                        class="toggle_btn"
                        aria-label="Mark as completed"
                    >
                        <img src="images/checkbox.svg" alt="" />
                    </button>
                    <span class="task-text">right click to cancel</span>
                    <button
                        type="button"
                        class="delete-btn"
                        aria-label="Delete task"
                    >
                        <img src="images/trash.svg" alt="" />
                    </button>
                </li>
            </ul>
            <script src="script.js"></script>
        </main>
    </body>
</html>
