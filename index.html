<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Todo List</title>
    </head>
    <body>
        <h1 id="title">Todo Tracker</h1>
        <main id="content">
            <form action="" id="task-form">
                <input
                    type="text"
                    id="inputTask"
                    placeholder="Start writing and press enter to add a task"
                />
                <button type="submit" id="btnCreateTask">Add Task</button>
            </form>
            <ul id="task-list">
                <li>left click to mark as completed</li>
                <li>right click to cancel</li>
            </ul>
            <script src="script.js"></script>
        </main>
    </body>
</html>
